<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f172a;
    width: 600px;
    height: 400px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-app-region: drag;
  }

  canvas { position: absolute; inset: 0; }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 1s ease 0.4s forwards;
  }

  .logo {
    width: 72px;
    height: 72px;
    background: #1e40af;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 0 40px rgba(96, 165, 250, 0.4);
  }

  .wordmark {
    font-size: 32px;
    font-weight: 700;
    color: #f9fafb;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 13px;
    color: #6b7280;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    color: #4b5563;
    letter-spacing: 0.5px;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  .status span { animation: pulse 2s ease-in-out infinite; display: inline-block; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="logo">AI</div>
  <div class="wordmark">Hive</div>
  <div class="tagline">AI · Transcription · Agents</div>
</div>

<div class="status"><span id="statusText">Checking credentials…</span></div>

<script src="../renderer/splash.js"></script>
</body>
</html>
