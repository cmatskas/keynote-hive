<!DOCTYPE html>
<html>
<head>
    <title>AWS Credentials Setup - Hive</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script>
        (function () {
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            let theme = 'auto';
            try {
                const cached = localStorage.getItem('app-theme-preference');
                if (cached && ['light', 'dark', 'auto'].includes(cached)) theme = cached;
            } catch {}
            const effectiveTheme = theme === 'auto' ? systemTheme : theme;
            document.documentElement.setAttribute('data-theme', effectiveTheme);
            document.documentElement.setAttribute('data-bs-theme', effectiveTheme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container-fluid">
        <div class="credentials-container">
            <div class="text-center mb-4">
                <h1 class="h3"><i class="bi bi-shield-lock"></i> AWS Credentials</h1>
                <p class="text-muted">Paste your AWS credentials to get started</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="credentialsForm">
                        <div class="mb-3">
                            <label for="accessKeyId" class="form-label">Access Key ID *</label>
                            <input type="text" class="form-control" id="accessKeyId" required>
                        </div>
                        <div class="mb-3">
                            <label for="secretAccessKey" class="form-label">Secret Access Key *</label>
                            <input type="password" class="form-control" id="secretAccessKey" required>
                        </div>
                        <div class="mb-3">
                            <label for="region" class="form-label">AWS Region *</label>
                            <select class="form-select" id="region" required>
                                <option value="">Select a region</option>
                                <option value="us-east-1">US East (N. Virginia)</option>
                                <option value="us-west-2">US West (Oregon)</option>
                                <option value="eu-west-1">Europe (Ireland)</option>
                                <option value="ap-southeast-1">Asia Pacific (Singapore)</option>
                                <option value="ap-northeast-1">Asia Pacific (Tokyo)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="sessionToken" class="form-label">Session Token <span class="text-muted">(optional)</span></label>
                            <input type="password" class="form-control" id="sessionToken">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" id="saveBtn">
                                <i class="bi bi-check-circle"></i> Save & Connect
                            </button>
                            <button type="button" class="btn btn-outline-secondary" onclick="pasteCredentialsFromClipboard()">
                                <i class="bi bi-clipboard"></i> Paste Credentials
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.js"></script>
    <script src="../renderer/themeManager.js"></script>
    <script src="../renderer/credentials.js"></script>
</body>
</html>
