<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="cell-center" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cell-ring1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="cell-ring2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow behind cluster -->
  <ellipse cx="256" cy="256" rx="130" ry="120" fill="#f59e0b" opacity="0.08" filter="url(#glow)"/>

  <!-- Honeycomb cluster - 19 hexagons in pointy-top orientation -->
  <!-- Drawing radius = 27.5 (grid spacing R=30, gap ~5px) -->
  <!-- Vertices: (cx, cy-27.5), (cx+23.8, cy-13.75), (cx+23.8, cy+13.75), (cx, cy+27.5), (cx-23.8, cy+13.75), (cx-23.8, cy-13.75) -->

  <!-- Ring 2 (outermost) -->
  <polygon points="360,228.5 383.8,242.25 383.8,269.75 360,283.5 336.2,269.75 336.2,242.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="334,183.5 357.8,197.25 357.8,224.75 334,238.5 310.2,224.75 310.2,197.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="308,138.5 331.8,152.25 331.8,179.75 308,193.5 284.2,179.75 284.2,152.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="256,138.5 279.8,152.25 279.8,179.75 256,193.5 232.2,179.75 232.2,152.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="204,138.5 227.8,152.25 227.8,179.75 204,193.5 180.2,179.75 180.2,152.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="178,183.5 201.8,197.25 201.8,224.75 178,238.5 154.2,224.75 154.2,197.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="152,228.5 175.8,242.25 175.8,269.75 152,283.5 128.2,269.75 128.2,242.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="178,273.5 201.8,287.25 201.8,314.75 178,328.5 154.2,314.75 154.2,287.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="204,318.5 227.8,332.25 227.8,359.75 204,373.5 180.2,359.75 180.2,332.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="256,318.5 279.8,332.25 279.8,359.75 256,373.5 232.2,359.75 232.2,332.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="308,318.5 331.8,332.25 331.8,359.75 308,373.5 284.2,359.75 284.2,332.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="334,273.5 357.8,287.25 357.8,314.75 334,328.5 310.2,314.75 310.2,287.25" fill="url(#cell-ring2)" stroke="#78350f" stroke-width="1.5"/>

  <!-- Ring 1 -->
  <polygon points="308,228.5 331.8,242.25 331.8,269.75 308,283.5 284.2,269.75 284.2,242.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="282,183.5 305.8,197.25 305.8,224.75 282,238.5 258.2,224.75 258.2,197.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="230,183.5 253.8,197.25 253.8,224.75 230,238.5 206.2,224.75 206.2,197.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="204,228.5 227.8,242.25 227.8,269.75 204,283.5 180.2,269.75 180.2,242.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="230,273.5 253.8,287.25 253.8,314.75 230,328.5 206.2,314.75 206.2,287.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>
  <polygon points="282,273.5 305.8,287.25 305.8,314.75 282,328.5 258.2,314.75 258.2,287.25" fill="url(#cell-ring1)" stroke="#78350f" stroke-width="1.5"/>

  <!-- Center cell (brightest) -->
  <polygon points="256,228.5 279.8,242.25 279.8,269.75 256,283.5 232.2,269.75 232.2,242.25" fill="url(#cell-center)" stroke="#78350f" stroke-width="1.5"/>
</svg>
